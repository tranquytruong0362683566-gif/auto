<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMHREELS - Đăng Reels Facebook</title>
  <style>
    :root {
      --bg-main: #0f1117;
      --bg-card: #1a1d2e;
      --bg-header: #151824;
      --border-color: #2d3148;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --accent: #818cf8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); font-size: 14px; min-height: 100vh; padding-bottom: 40px; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-card); padding: 14px 24px; border-bottom: 1px solid var(--border-color);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
    .user-info { font-size: 13px; }
    .user-name { color: var(--accent); font-weight: bold; display: flex; align-items: center; gap: 5px; font-size: 15px; }
    .ext-status { font-size: 12px; margin-top: 4px; font-weight: 600; }
    .header-title { color: var(--accent); font-size: 22px; font-weight: 700; text-align: center; flex: 1; letter-spacing: 0.5px; }

    .container { padding: 24px; max-width: 760px; margin: 0 auto; }
    .card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); padding: 28px; }

    .center-box { text-align: center; padding: 60px 20px; }
    .center-box h2 { color: var(--accent); margin-bottom: 10px; font-size: 18px; }
    .center-box p { color: var(--text-muted); margin-bottom: 24px; font-size: 13px; }

    .btn-fb-login {
      background: #1877f2; color: #fff; border: none; padding: 12px 28px; border-radius: 8px;
      font-weight: 700; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-fb-login:hover { background: #166fe0; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: var(--text-muted); }

    select, textarea, input[type="text"] {
      width: 100%; padding: 10px 12px; border: 1px solid #475569; border-radius: 6px; font-size: 13px;
      background: var(--bg-main); color: var(--text-main); outline: none; transition: 0.2s;
    }
    textarea { height: 100px; resize: vertical; }
    select:focus, textarea:focus, input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }

    .file-input-wrapper { display: flex; border: 1px solid #475569; border-radius: 6px; overflow: hidden; background: var(--bg-main); }
    .file-btn { background: #2d3148; border: none; padding: 10px 16px; color: var(--text-main); cursor: pointer; border-right: 1px solid #475569; font-size: 13px; font-weight: 600; }
    .file-btn:hover { background: #3d4260; }
    .file-text { padding: 10px 12px; font-size: 13px; color: var(--text-muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .btn-submit {
      width: 100%; background: var(--primary); color: #fff; border: none; padding: 13px 24px; border-radius: 8px;
      font-weight: 700; cursor: pointer; font-size: 14px; transition: 0.2s; margin-top: 6px;
    }
    .btn-submit:hover { background: var(--primary-hover); }
    .btn-submit:disabled { background: #475569; color: var(--text-muted); cursor: not-allowed; }

    .btn-logout {
      background: transparent; border: 1px solid var(--border-color); color: var(--text-muted);
      padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    .status-box { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 13px; display: none; }
    .status-box.show { display: block; }
    .status-box.ok { background: #1a3a2a; color: #34d399; }
    .status-box.err { background: #3a1a1a; color: #f87171; }
    .status-box.loading { background: #1a2a3a; color: var(--accent); }

    .progress-bar-wrap { background: var(--bg-main); border-radius: 6px; height: 8px; margin-top: 10px; overflow: hidden; display: none; }
    .progress-bar-wrap.show { display: block; }
    .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <img id="userAvatar" src="https://ui-avatars.com/api/?name=FB&background=4f46e5&color=fff" alt="Avatar">
      <div class="user-info">
        <div class="user-name">👋 <span id="accountName">Chưa đăng nhập</span></div>
        <div class="ext-status" id="ext-status" style="color: var(--text-muted);">Đăng nhập để bắt đầu</div>
      </div>
    </div>
    <div class="header-title">DMHREELS</div>
    <div style="width: 150px; text-align: right;">
      <button class="btn-logout" id="btnLogout" style="display:none;">Đăng xuất</button>
    </div>
  </header>

  <div class="container">
    <div class="card">

      <!-- Màn hình chưa đăng nhập -->
      <div id="loginView" class="center-box">
        <h2>Đăng nhập để quản lý Fanpage</h2>
        <p>Đăng nhập bằng tài khoản Facebook của Page bạn muốn đăng Reels.<br>Mỗi lần chỉ thao tác với 1 tài khoản — đăng xuất để đổi tài khoản khác.</p>
        <button class="btn-fb-login" id="btnFbLogin">📘 Đăng nhập bằng Facebook</button>
        <div class="status-box" id="loginStatus"></div>
      </div>

      <!-- Màn hình đăng bài (hiện sau khi login) -->
      <div id="postView" style="display:none;">
        <div class="form-group">
          <label>Chọn Fanpage (chỉ các page bạn đang quản lý):</label>
          <select id="pageSelect"></select>
        </div>

        <div class="form-group">
          <label>Nội dung Caption Reels:</label>
          <textarea id="postContent" placeholder="Nhập mô tả video..."></textarea>
        </div>

        <div class="form-group">
          <label>Chọn file video:</label>
          <div class="file-input-wrapper">
            <button class="file-btn" type="button" onclick="document.getElementById('videoFile').click()">Chọn tệp video</button>
            <div class="file-text" id="fileText">Chưa có video nào được chọn...</div>
            <input type="file" id="videoFile" style="display:none" accept="video/*">
          </div>
        </div>

        <button class="btn-submit" id="btnSubmit">🎬 Đăng Reels lên Page này</button>

        <div class="progress-bar-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status-box" id="postStatus"></div>
      </div>

    </div>
  </div>

  <script>
    // ============ CẤU HÌNH ============
    const FB_APP_ID = '1952106285437493';
    const GRAPH_VERSION = 'v19.0';

    let currentAccessToken = null;
    let currentPages = [];

    // ============ 1. KHỞI TẠO FACEBOOK SDK ============
    window.fbAsyncInit = function () {
      FB.init({ appId: FB_APP_ID, cookie: true, xfbml: false, version: GRAPH_VERSION });

      // Nếu đã có session trước đó (chưa logout), tự khôi phục
      FB.getLoginStatus(function (response) {
        if (response.status === 'connected') {
          onLoginSuccess(response.authResponse.accessToken);
        }
      });
    };

    (function (d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) return;
      js = d.createElement(s); js.id = id;
      js.src = "https://connect.facebook.net/vi_VN/sdk.js";
      fjs.parentNode.insertBefore(js, fjs);
    }(document, 'script', 'facebook-jssdk'));

    // ============ 2. ĐĂNG NHẬP ============
    document.getElementById('btnFbLogin').addEventListener('click', () => {
      const statusEl = document.getElementById('loginStatus');
      statusEl.className = 'status-box show loading';
      statusEl.textContent = '⏳ Đang mở cửa sổ đăng nhập Facebook...';

      FB.login(function (response) {
        if (response.authResponse) {
          onLoginSuccess(response.authResponse.accessToken);
        } else {
          statusEl.className = 'status-box show err';
          statusEl.textContent = '❌ Bạn đã hủy đăng nhập hoặc từ chối cấp quyền.';
        }
      }, { scope: 'pages_show_list,pages_manage_posts,pages_read_engagement' });
    });

    async function onLoginSuccess(accessToken) {
      currentAccessToken = accessToken;
      const statusEl = document.getElementById('loginStatus');
      statusEl.className = 'status-box show loading';
      statusEl.textContent = '⏳ Đang lấy thông tin tài khoản và danh sách Page...';

      try {
        // Lấy thông tin user
        const meRes = await fetch(`https://graph.facebook.com/${GRAPH_VERSION}/me?fields=name,picture&access_token=${accessToken}`);
        const me = await meRes.json();
        if (me.error) throw new Error(me.error.message);

        document.getElementById('accountName').textContent = me.name;
        if (me.picture && me.picture.data) document.getElementById('userAvatar').src = me.picture.data.url;
        document.getElementById('ext-status').textContent = '✅ Đã đăng nhập';
        document.getElementById('ext-status').style.color = 'var(--success)';
        document.getElementById('btnLogout').style.display = 'inline-block';

        // Lấy danh sách page user này quản lý
        const pagesRes = await fetch(`https://graph.facebook.com/${GRAPH_VERSION}/me/accounts?fields=name,id,access_token,category,picture&limit=250&access_token=${accessToken}`);
        const pagesData = await pagesRes.json();
        if (pagesData.error) throw new Error(pagesData.error.message);

        currentPages = pagesData.data || [];

        if (currentPages.length === 0) {
          statusEl.className = 'status-box show err';
          statusEl.textContent = '⚠️ Tài khoản này không quản lý Fanpage nào, hoặc bạn chưa cấp quyền pages_show_list khi đăng nhập.';
          return;
        }

        // Đổ vào dropdown
        const sel = document.getElementById('pageSelect');
        sel.innerHTML = currentPages.map(p => `<option value="${p.id}">${p.name} (${p.category || 'Page'})</option>`).join('');

        document.getElementById('loginView').style.display = 'none';
        document.getElementById('postView').style.display = 'block';

      } catch (err) {
        statusEl.className = 'status-box show err';
        statusEl.textContent = `❌ Lỗi: ${err.message}`;
      }
    }

    // ============ 3. ĐĂNG XUẤT ============
    document.getElementById('btnLogout').addEventListener('click', () => {
      FB.logout(function () {
        currentAccessToken = null;
        currentPages = [];
        document.getElementById('accountName').textContent = 'Chưa đăng nhập';
        document.getElementById('userAvatar').src = 'https://ui-avatars.com/api/?name=FB&background=4f46e5&color=fff';
        document.getElementById('ext-status').textContent = 'Đăng nhập để bắt đầu';
        document.getElementById('ext-status').style.color = 'var(--text-muted)';
        document.getElementById('btnLogout').style.display = 'none';
        document.getElementById('postView').style.display = 'none';
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('loginStatus').className = 'status-box';
      });
    });

    // ============ 4. CHỌN FILE VIDEO ============
    document.getElementById('videoFile').addEventListener('change', function () {
      document.getElementById('fileText').textContent = this.files.length > 0 ? this.files[0].name : 'Chưa có video nào được chọn...';
    });

    // ============ 5. ĐĂNG REELS LÊN PAGE ĐÃ CHỌN (NGƯỜI DÙNG TỰ BẤM) ============
    document.getElementById('btnSubmit').addEventListener('click', async () => {
      const pageId = document.getElementById('pageSelect').value;
      const page = currentPages.find(p => p.id === pageId);
      const content = document.getElementById('postContent').value;
      const fileInput = document.getElementById('videoFile');
      const statusEl = document.getElementById('postStatus');
      const btn = document.getElementById('btnSubmit');
      const progressWrap = document.getElementById('progressWrap');
      const progressBar = document.getElementById('progressBar');

      if (!page) { alert('⚠️ Vui lòng chọn 1 Fanpage.'); return; }
      if (fileInput.files.length === 0) { alert('⚠️ Vui lòng chọn tệp video.'); return; }

      const pageAccessToken = page.access_token; // Token riêng của Page, do Graph API trả về cùng /me/accounts

      btn.disabled = true;
      btn.textContent = '⏳ Đang đăng...';
      statusEl.className = 'status-box show loading';
      statusEl.textContent = `Đang upload video lên "${page.name}"...`;
      progressWrap.className = 'progress-bar-wrap show';
      progressBar.style.width = '10%';

      try {
        // Bước 1: Khởi tạo phiên upload video (Graph API Video Upload - phương thức resumable)
        const initForm = new FormData();
        initForm.append('upload_phase', 'start');
        initForm.append('access_token', pageAccessToken);

        const initRes = await fetch(`https://graph-video.facebook.com/${GRAPH_VERSION}/${page.id}/videos`, {
          method: 'POST', body: initForm
        });
        const initData = await initRes.json();
        if (initData.error) throw new Error(initData.error.message);

        progressBar.style.width = '40%';

        // Bước 2: Upload nội dung file video
        const uploadForm = new FormData();
        uploadForm.append('upload_phase', 'transfer');
        uploadForm.append('start_offset', initData.start_offset);
        uploadForm.append('upload_session_id', initData.upload_session_id);
        uploadForm.append('video_file_chunk', fileInput.files[0]);
        uploadForm.append('access_token', pageAccessToken);

        const uploadRes = await fetch(`https://graph-video.facebook.com/${GRAPH_VERSION}/${page.id}/videos`, {
          method: 'POST', body: uploadForm
        });
        const uploadData = await uploadRes.json();
        if (uploadData.error) throw new Error(uploadData.error.message);

        progressBar.style.width = '80%';

        // Bước 3: Hoàn tất, gắn caption, đăng thành Reels (video_state = PUBLISHED)
        const finishForm = new FormData();
        finishForm.append('upload_phase', 'finish');
        finishForm.append('upload_session_id', initData.upload_session_id);
        finishForm.append('description', content);
        finishForm.append('video_state', 'PUBLISHED');
        finishForm.append('access_token', pageAccessToken);

        const finishRes = await fetch(`https://graph-video.facebook.com/${GRAPH_VERSION}/${page.id}/videos`, {
          method: 'POST', body: finishForm
        });
        const finishData = await finishRes.json();
        if (finishData.error) throw new Error(finishData.error.message);

        progressBar.style.width = '100%';
        statusEl.className = 'status-box show ok';
        statusEl.textContent = `✅ Đăng thành công lên "${page.name}"!`;

      } catch (err) {
        statusEl.className = 'status-box show err';
        statusEl.textContent = `❌ Lỗi: ${err.message}`;
        progressWrap.className = 'progress-bar-wrap';
      } finally {
        btn.disabled = false;
        btn.textContent = '🎬 Đăng Reels lên Page này';
      }
    });
  </script>
</body>
</html>
